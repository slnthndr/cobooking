services:

  postgres:
    image: postgres:15-alpine
    container_name: cobooking-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cobooking
    ports:
      - "5432:5432"
    volumes:
      - ./pg_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cobooking-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: cobooking-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 15

  minio:
    image: minio/minio:latest
    container_name: cobooking-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    volumes:
      - ./minio_data:/data
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: cobooking-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: cobooking-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      prometheus:
        condition: service_started
    restart: unless-stopped

  # ==========================
  # MICROSERVICES
  # ==========================

  ms-auth:
    build: ./ms-auth
    container_name: ms-auth
    restart: always
    environment:
      PORT: "8081"
      POSTGRES_URL: "postgres://admin:password@postgres:5432/cobooking?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      JWT_SECRET: "MY_SUPER_SECRET_KEY_123"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ms-places:
    build: ./ms-places
    container_name: ms-places
    restart: always
    environment:
      PORT: "8082"
      POSTGRES_URL: "postgres://admin:password@postgres:5432/cobooking?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_USER: "admin"
      MINIO_PASSWORD: "password123"
      MINIO_BUCKET: "workspaces"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  ms-booking:
    build: ./ms-booking
    container_name: ms-booking
    restart: always
    environment:
      PORT: "8083"
      POSTGRES_URL: "postgres://admin:password@postgres:5432/cobooking?sslmode=disable"
      RABBITMQ_URL: "amqp://admin:password@rabbitmq:5672/"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  ms-notifications:
    build: ./ms-notifications
    container_name: ms-notifications
    restart: always
    environment:
      PORT: "8084"
      POSTGRES_URL: "postgres://admin:password@postgres:5432/cobooking?sslmode=disable"
      RABBITMQ_URL: "amqp://admin:password@rabbitmq:5672/"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  ms-payments:
    build: ./ms-payments
    container_name: ms-payments
    restart: always
    environment:
      PORT: "8085"
      POSTGRES_URL: "postgres://admin:password@postgres:5432/cobooking?sslmode=disable"
      RABBITMQ_URL: "amqp://admin:password@rabbitmq:5672/"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    restart: always
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      REDIS_ADDR: "redis:6379"
      JWT_SECRET: "MY_SUPER_SECRET_KEY_123"
      MS_AUTH_URL: "http://ms-auth:8081"
      MS_PLACES_URL: "http://ms-places:8082"
      MS_BOOKING_URL: "http://ms-booking:8083"
      MS_PAYMENTS_URL: "http://ms-payments:8085"
    depends_on:
      ms-auth:
        condition: service_started
      ms-places:
        condition: service_started
      ms-booking:
        condition: service_started
      ms-payments:
        condition: service_started
